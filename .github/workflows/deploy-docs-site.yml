name: Documentation

on:
  # TODO: Consider running on schedule instead of on push
  push:
    branches:
      - main
  # Allow running manually
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: deploy-docs-website
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        # TODO: generate matrix from version-info.toml
        include:
          - name: unstable
            ref: main
            sub-path: ""
            base-href: /nixvim/
          - name: "25.05"
            ref: nixos-25.05
            sub-path: "25.05"
            base-href: /nixvim/25.05/
          - name: "24.11"
            ref: nixos-24.11
            sub-path: "24.11"
            base-href: /nixvim/24.11/

    steps:
      - name: Install nix
        uses: cachix/install-nix-action@v31

      - name: Configure cachix
        uses: cachix/cachix-action@v16
        with:
          name: nix-community
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

        # Uses the build-docs action from the checked-out nixvim branch
      - name: Build docs
        uses: ./.github/actions/build-docs
        with:
          artifact-name: ${{ matrix.name }}-docs
          sub-path: ${{ matrix.sub-path }}
          base-href: ${{ matrix.base-href }}
          # TODO: generate JSON from version-info.toml
          versions: >
            [
              {
                "branch": "main",
                "nixpkgsBranch": "nixos-unstable",
                "baseHref": "/nixvim/"
              },
              {
                "branch": "nixos-25.05",
                "nixpkgsBranch": "nixos-25.05",
                "baseHref": "/nixvim/25.05/"
              },
              {
                "branch": "nixos-24.11",
                "nixpkgsBranch": "nixos-24.11",
                "baseHref": "/nixvim/24.11/"
              }
            ]

  combine:
    name: Combine builds
    runs-on: ubuntu-latest
    needs: build

    env:
      repo: ${{ github.repository }}
      repoName: ${{ github.event.repository.name }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: result
          pattern: "*-docs"
          merge-multiple: false

      - name: Extract archives
        working-directory: result
        run: |
          for archive in */archive.tar
          do
            echo "$archive" >> files
          done
          mkdir -p combined
          parallel \
              tar --extract \
                  --file "$archive" \
                  --directory combined \
              < files

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined

  deploy:
    name: Deploy
    needs: combine

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
